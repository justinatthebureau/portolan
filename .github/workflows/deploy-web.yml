name: Deploy Web

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - "registry/index.json"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: web
        run: npm install

      - name: Build
        working-directory: web
        run: npm run build
        env:
          # Raw URL for the registry index — always points to main branch
          VITE_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/registry/index.json
          # Set to /repo-name/ if no custom domain, or / if using custom domain
          # Update this when you set up your repo
          VITE_BASE_PATH: /portolan/

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
