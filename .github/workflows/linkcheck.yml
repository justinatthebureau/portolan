name: Link Check

on:
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 9am UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx pydantic

      - name: Run link checker
        id: linkcheck
        working-directory: registry
        run: python linkcheck.py
        continue-on-error: true

      - name: Open issue if dead links found
        if: steps.linkcheck.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Dead links found in registry — ${new Date().toISOString().split('T')[0]}`;
            const body = `The weekly link check found one or more dead links in registry artifacts.\n\nSee the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\nPlease update or remove the affected artifacts.`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dead-links'
            });

            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['dead-links', 'registry']
              });
            }
